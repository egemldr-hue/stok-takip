<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Sistemi | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #logs-container::-webkit-scrollbar { width: 5px; }
        #logs-container::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .font-black { font-weight: 900 !important; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen p-4 font-sans text-black">

    <div id="login-screen" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl mt-20 border border-white">
        <h2 class="text-3xl font-black mb-6 text-center text-blue-600 uppercase italic">Sistem Girişi</h2>
        <input type="password" id="password" placeholder="Şifre" class="w-full p-4 border-2 border-slate-300 rounded-2xl mb-4 text-center text-xl text-black outline-none font-black focus:border-blue-500">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">GİRİŞ YAP</button>
    </div>

    <div id="form-screen" class="max-w-md mx-auto hidden relative">
        <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-2xl font-black tracking-tighter text-black uppercase">Malzeme Kayıt</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-2 rounded-xl font-black text-xs shadow-md uppercase">Çıkış</button>
        </div>
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 border-b-8 border-blue-500">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest text-black">Alan Kişi</label>
                    <input type="text" id="receiver" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-black font-black outline-none focus:border-blue-500" placeholder="Ad Soyad">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest text-black">Ürün Seçimi</label>
                    <select id="product-list" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-black font-black outline-none focus:border-blue-500">
                        <option value="">Yükleniyor...</option>
                    </select>
                </div>
                <div class="flex space-x-3">
                    <div class="flex-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest text-black">Miktar</label>
                        <input type="number" id="amount" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-black font-black text-center text-xl" value="1" min="1">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest text-black">Birim</label>
                        <input type="text" id="unit" class="w-full p-4 bg-blue-50 text-blue-900 font-black rounded-2xl text-center border-2 border-blue-100 text-xl" readonly placeholder="-">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest text-black">Açıklama / Not</label>
                    <input type="text" id="note" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-black font-black outline-none focus:border-blue-500" placeholder="Örn: Acil İhtiyaç">
                </div>
                <button onclick="submitData()" id="submit-btn" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">KAYDI TAMAMLA</button>
                <div id="success-msg" class="hidden text-center p-3 bg-emerald-100 text-emerald-900 rounded-2xl font-black">✅ Başarıyla Kaydedildi!</div>
            </div>
        </div>

        <button onclick="openLogs()" class="w-full bg-white border-4 border-blue-600 text-blue-600 p-5 rounded-[2.5rem] font-black flex justify-center items-center gap-3 shadow-xl hover:bg-blue-50 transition-all">
            <span>📋 KAYIT GEÇMİŞİNİ GÖR</span>
        </button>
    </div>

    <div id="logs-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md hidden z-50 p-4 flex items-center">
        <div class="bg-white w-full max-w-md mx-auto rounded-[2.5rem] shadow-2xl h-[85vh] flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-white rounded-t-[2.5rem]">
                <h2 class="text-2xl font-black text-black uppercase italic tracking-tighter">İşlem Geçmişi</h2>
                <button onclick="closeLogs()" class="text-4xl font-light text-slate-400 hover:text-red-500">&times;</button>
            </div>
            <div id="logs-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100 text-black">
                <p class="text-center py-10 font-black italic">Excel Taranıyor...</p>
            </div>
            <div class="p-6 border-t bg-white rounded-b-[2.5rem]">
                <button onclick="loadRecentLogs()" class="w-full py-4 text-blue-600 font-black text-sm bg-blue-50 rounded-2xl active:scale-95 transition-all shadow-sm border-2 border-blue-100">LİSTEYİ YENİLE ↻</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1oEEXP5UdlKQ_B4MamuSHMbpyMraFeX7y1ioLvOrYtP8';
        const WEBHOOK_URL = 'https://deniz3300.app.n8n.cloud/webhook/kayit-ekle';
        
        function checkLogin() {
            if(document.getElementById('password').value === '1234') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('form-screen').classList.remove('hidden');
                loadProducts();
            } else { alert('Hatalı Şifre!'); }
        }

        function openLogs() { 
            document.getElementById('logs-modal').classList.remove('hidden');
            loadRecentLogs();
        }
        function closeLogs() { document.getElementById('logs-modal').classList.add('hidden'); }

        async function loadProducts() {
            try {
                const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/Urun_Listesi?t=${Date.now()}`);
                const data = await res.json();
                const select = document.getElementById('product-list');
                select.innerHTML = '<option value="">Seçiniz...</option>';
                data.forEach(p => {
                    const name = p["Ürün Adı"] || p.Urun_Adi || p.product;
                    if(name) {
                        const opt = document.createElement('option');
                        opt.value = name; opt.textContent = name; select.appendChild(opt);
                    }
                });
                select.addEventListener('change', (e) => {
                    const item = data.find(x => (x["Ürün Adı"] || x.Urun_Adi || x.product) === e.target.value);
                    document.getElementById('unit').value = item ? (item.Birim || item.unit) : '';
                });
            } catch (e) { console.error("Hata!"); }
        }

        async function loadRecentLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = '<p class="text-center text-blue-600 font-black py-10 animate-pulse uppercase tracking-widest">Excel Taranıyor...</p>';
            try {
                // EXCEL SEKME ADI: KAYIT
                const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/KAYIT?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                const logs = await res.json();
                
                container.innerHTML = '';
                if (!Array.isArray(logs) || logs.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 font-black">Henüz kayıt yok.</p>';
                    return;
                }

                logs.reverse().forEach(log => {
                    const pName = log["Ürün Adı"] || log.product || "Belirsiz";
                    const pAmount = log["Miktar"] || log.amount || "0";
                    const pUnit = log["Birim"] || log.unit || "";
                    const pUser = log["Ürünü Alan Kişi"] || log.receiver || "-";
                    const pDate = log["Kayıt Tarihi"] || log.date || "Tarih Yok";
                    const pTime = log["Kayıt Saati"] || log.time || "Saat Yok";
                    const pNote = log["Açıklama"] || log["Bölüm"] || "-";

                    const div = document.createElement('div');
                    div.className = "p-5 bg-white rounded-3xl shadow-lg border-2 border-slate-50 text-black";
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-black text-black text-lg uppercase leading-tight">${pName}</span>
                            <span class="bg-blue-600 text-white px-3 py-1 rounded-xl text-xs font-black shadow-md">${pAmount} ${pUnit}</span>
                        </div>
                        <div class="space-y-1 border-t pt-2 border-slate-100">
                            <p class="text-[12px] text-black font-black uppercase"><span class="text-blue-500 italic">Alan:</span> ${pUser}</p>
                            <p class="text-[12px] text-black font-black uppercase"><span class="text-blue-500 italic">Not:</span> ${pNote}</p>
                            <div class="flex justify-between text-[11px] text-black font-black mt-3 pt-2 border-t border-dotted border-slate-300 bg-slate-50 p-2 rounded-xl">
                                <span>📅 ${pDate}</span>
                                <span>⏰ ${pTime}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) { 
                container.innerHTML = '<p class="text-center py-10 text-red-600 font-black uppercase tracking-tighter">Bağlantı Hatası!</p>'; 
            }
        }

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            const data = {
                date: new Date().toLocaleDateString('tr-TR'),
                time: new Date().toLocaleTimeString('tr-TR'),
                receiver: document.getElementById('receiver').value,
                product: document.getElementById('product-list').value,
                amount: document.getElementById('amount').value,
                unit: document.getElementById('unit').value,
                dept: document.getElementById('note').value,
                staff: "Sistem"
            };
            if(!data.receiver || !data.product || !data.amount) { alert('Lütfen tüm alanları doldur knk!'); return; }
            btn.disabled = true; btn.innerText = 'GÖNDERİLİYOR...';
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    document.getElementById('success-msg').classList.remove('hidden');
                    document.getElementById('amount').value = '1';
                    document.getElementById('note').value = '';
                    setTimeout(() => { document.getElementById('success-msg').classList.add('hidden'); }, 3000);
                    loadRecentLogs();
                }
            } catch (e) { alert('Hata oluştu!'); }
            btn.disabled = false; btn.innerText = 'KAYDI TAMAMLA';
        }
    </script>
</body>
</html>
