<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="login-screen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-20">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Sistem Girişi</h2>
        <input type="password" id="password" placeholder="Şifre (1234)" class="w-full p-3 border rounded-lg mb-4 text-center">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Giriş Yap</button>
    </div>

    <div id="form-screen" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg hidden">
        <h2 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">Malzeme Kayıt Formu</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Ürünü Alan Kişi</label>
                <input type="text" id="receiver" class="w-full p-2 border rounded-lg" placeholder="Ad Soyad">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Ürün Seçin</label>
                <select id="product-list" class="w-full p-2 border rounded-lg bg-white">
                    <option value="">Ürünler yükleniyor...</option>
                </select>
            </div>
            <div class="flex space-x-2">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700">Miktar</label>
                    <input type="number" id="amount" class="w-full p-2 border rounded-lg" placeholder="0">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700">Birim</label>
                    <input type="text" id="unit" class="w-full p-2 border rounded-lg bg-gray-50" readonly>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Bölüm / Departman</label>
                <input type="text" id="dept" class="w-full p-2 border rounded-lg" placeholder="Örn: Paketleme">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Açıklama / Not</label>
                <textarea id="note" class="w-full p-2 border rounded-lg" rows="2"></textarea>
            </div>
            <button onclick="submitData()" id="submit-btn" class="w-full bg-green-600 text-white p-4 rounded-lg font-bold text-lg shadow-md">KAYDET</button>
        </div>
    </div>

    <script>
        const N8N_GET_URL = 'https://deniz3300.app.n8n.cloud/webhook/urunleri-getir';
        const N8N_POST_URL = 'https://deniz3300.app.n8n.cloud/webhook/kayit-ekle';
        let allProducts = [];

        function checkLogin() {
            if(document.getElementById('password').value === '1234') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('form-screen').classList.remove('hidden');
                loadProducts();
            } else { alert('Hatalı Şifre!'); }
        }

        async function loadProducts() {
            try {
                const response = await fetch(N8N_GET_URL);
                allProducts = await response.json();
                const select = document.getElementById('product-list');
                select.innerHTML = '<option value="">Seçiniz...</option>';
                allProducts.forEach(p => {
                    select.innerHTML += `<option value="${p.Urun_Adi}">${p.Urun_Adi}</option>`;
                });
                select.addEventListener('change', (e) => {
                    const item = allProducts.find(x => x.Urun_Adi === e.target.value);
                    document.getElementById('unit').value = item ? item.Birim : '';
                });
            } catch (e) { console.error('Hata:', e); }
        }

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            const data = {
                date: new Date().toLocaleDateString('tr-TR'),
                time: new Date().toLocaleTimeString('tr-TR'),
                receiver: document.getElementById('receiver').value,
                product: document.getElementById('product-list').value,
                amount: document.getElementById('amount').value,
                unit: document.getElementById('unit').value,
                dept: document.getElementById('dept').value,
                note: document.getElementById('note').value,
                staff: "Sistem"
            };
            if(!data.receiver || !data.product || !data.amount) { alert('Eksik alanları doldurun!'); return; }
            btn.disabled = true; btn.innerText = 'GÖNDERİLİYOR...';
            try {
                await fetch(N8N_POST_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                alert('Kayıt Başarıyla Eklendi!');
                location.reload();
            } catch (e) { alert('Hata oluştu!'); btn.disabled = false; btn.innerText = 'KAYDET'; }
        }
    </script>
</body>
</html>
