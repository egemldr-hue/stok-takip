<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-300 min-h-screen p-4 font-sans text-black">

    <div id="login-screen" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl mt-20">
        <h2 class="text-3xl font-black mb-6 text-center text-blue-600">GİRİŞ</h2>
        <input type="password" id="password" placeholder="Şifre" class="w-full p-4 border-2 border-slate-300 rounded-2xl mb-4 text-center text-xl font-black outline-none">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-lg shadow-lg">GİRİŞ YAP</button>
    </div>

    <div id="form-screen" class="max-w-md mx-auto hidden relative">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Malzeme Kayıt</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 rounded-xl font-black text-xs">ÇIKIŞ</button>
        </div>
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 border-b-8 border-blue-600 text-center">
            <p class="mb-4 font-bold text-slate-500">Kayıt işlemini buradan yapabilirsiniz.</p>
            <button onclick="openLogs()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl uppercase">📋 KAYIT GEÇMİŞİNİ AÇ</button>
        </div>
    </div>

    <div id="logs-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-50 p-4 flex items-center">
        <div class="bg-white w-full max-w-md mx-auto rounded-[2.5rem] shadow-2xl h-[80vh] flex flex-col">
            <div class="p-8 border-b flex justify-between items-center">
                <h2 class="text-2xl font-black">İŞLEM GEÇMİŞİ</h2>
                <button onclick="closeLogs()" class="text-4xl">&times;</button>
            </div>
            <div id="logs-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100">
                <p class="text-center py-10">Yükleniyor...</p>
            </div>
            <div class="p-6 border-t">
                <button onclick="loadRecentLogs()" class="w-full py-4 text-blue-600 font-black bg-blue-50 rounded-2xl">YENİLE ↻</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1oEEXP5UdlKQ_B4MamuSHMbpyMraFeX7y1ioLvOrYtP8';
        
        function checkLogin() {
            if(document.getElementById('password').value === '1234') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('form-screen').classList.remove('hidden');
            } else { alert('Hatalı Şifre!'); }
        }

        function openLogs() { 
            document.getElementById('logs-modal').classList.remove('hidden');
            loadRecentLogs();
        }
        function closeLogs() { document.getElementById('logs-modal').classList.add('hidden'); }

        async function loadRecentLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = '<p class="text-center font-bold text-blue-600">Excel taranıyor...</p>';
            
            try {
                // Burada "KAYIT" ismini kullanıyoruz.
                const url = `https://opensheet.elk.sh/${SHEET_ID}/KAYIT`;
                const res = await fetch(url);
                
                if (!res.ok) {
                    container.innerHTML = `<div class="text-center p-4 text-red-600 font-black">
                        <p>HATA: EXCEL VERİ VERMEDİ!</p>
                        <p class="text-[10px] mt-2 text-black">Hata Kodu: ${res.status}</p>
                        <p class="text-[10px] text-black italic">Excel'deki sekme isminin tam olarak KAYIT olduğundan emin ol.</p>
                    </div>`;
                    return;
                }

                const logs = await res.json();
                container.innerHTML = '';
                
                if (logs.length === 0) {
                    container.innerHTML = '<p class="text-center font-bold">Kayıt bulunamadı.</p>';
                    return;
                }

                logs.reverse().forEach(log => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-white rounded-2xl shadow border-2 border-white";
                    div.innerHTML = `<p class="font-black text-lg">${log["Ürün Adı"] || log.product || "Ürün"}</p>
                                    <p class="text-xs font-bold text-slate-500 uppercase">Alan: ${log["Ürünü Alan Kişi"] || log.receiver || "-"}</p>`;
                    container.appendChild(div);
                });

            } catch (e) {
                container.innerHTML = '<p class="text-center text-red-600 font-black">İNTERNET HATASI!</p>';
            }
        }
    </script>
</body>
</html>
